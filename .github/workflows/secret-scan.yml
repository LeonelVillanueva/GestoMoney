name: Secret scanning

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
  schedule:
    # Lunes 06:00 UTC — escaneo periódico del historial
    - cron: '0 6 * * 1'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secretlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Secretlint (formato GitHub)
        run: npm run scan:secrets:ci

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (usa .gitleaks.toml en la raíz del repo)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
